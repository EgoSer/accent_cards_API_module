services:
  postgresql:
    image: postgres:15
    container_name: postgresql
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-u", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      start_period: 30s
      start_interval: 5s
      interval: 30s
      timeout: 5s
      retries: 8
    volumes:
      - ./database_data/postgresql:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - app_network
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/${POSTGRES_DB}"
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-100}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-20}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      AUTH_TYPE: scram-sha-256
    ports:
      - "${PGBOUNCER_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "psql -h 127.0.0.1 -p 5432 -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1;' || exit 1"]
      start_period: 10s
      start_interval: 5s
      interval: 30s
      timeout: 5s
      retries: 8
    depends_on:
      - postgresql
    networks:
      - app_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./database_data/redis:/data
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge
